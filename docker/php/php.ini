; --- Production PHP configuration for Green Express (Render / Apache) ---

; Mémoire : évite les fatals "Allowed memory size exhausted" lors de la
; génération de PDF (DomPDF) et du traitement d'images (GD / QR).
memory_limit = 256M

; Durée max d'un script. Apache/Render coupe au-delà ; on borne proprement
; pour renvoyer une vraie erreur plutôt qu'un worker qui meurt (502).
max_execution_time = 60
max_input_time = 60

; Uploads d'images (repas, avatars). Doit être >= la limite applicative (2 Mo)
; avec marge pour l'encodage base64 des avatars.
upload_max_filesize = 8M
post_max_size = 12M
max_file_uploads = 20

; Ne pas exposer les détails internes aux utilisateurs finaux en production.
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /dev/stderr

; --- OPcache : accélère le boot et réduit la pression mémoire ---
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
opcache.fast_shutdown = 1

; Réalpath cache : moins d'I/O sur les chemins de fichiers.
realpath_cache_size = 4096k
realpath_cache_ttl = 600
